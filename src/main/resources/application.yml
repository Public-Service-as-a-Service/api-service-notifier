#========================================
# General settings
#========================================
logging:
  level:
    root: INFO
openapi:
  name: ${spring.application.name}
  title: ${spring.application.name}
  version: '@project.version@'


spring:
  application:
    name: notifier
  datasource:
    username: ${ENV.DB.USERNAME}
    password: ${ENV.DB.PASSWORD}
    url: ${ENV.DB.URL}

  flyway:
    enabled: true

  security:
    oauth2:
      client:
        provider:
          sms-sender:
            token-uri: ${ENV.SMS-SENDER-TOKEN-URL}
          teams-sender:
            token-uri: ${ENV.TEAMS-SENDER-TOKEN-URL}
        registration:
          sms-sender:
            client-id: ${ENV.SMS-SENDER-CLIENT-ID}
            client-secret: ${ENV.SMS-SENDER-CLIENT-SECRET}
            authorization-grant-type: client_credentials
          teams-sender:
            client-id: ${ENV.TEAMS-SENDER-CLIENT-ID}
            client-secret: ${ENV.TEAMS-SENDER-CLIENT-SECRET}
            authorization-grant-type: client_credentials


server:
  port: 8082
integration:
  sms-sender:
    base-url: ${ENV.SMS-SENDER-BASE-URL}
  teams-sender:
    base-url: ${ENV.TEAMS-SENDER-BASE-URL}